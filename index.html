<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gymnasie Meritkalkylator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .animate-fade {
      animation: fade 0.25s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="text-white flex items-center justify-center p-6">

  <div class="w-full max-w-5xl glass rounded-3xl shadow-2xl p-8 animate-fade">

    <div class="text-center mb-10">
      <div class="mb-6 max-w-md mx-auto">
        <label class="block text-slate-300 mb-3 font-medium">
          Välj gymnasieprogram
        </label>

        <select
          id="programSelect"
          onchange="loadProgram()"
          class="w-full bg-slate-900 border border-white/10 rounded-2xl p-4 text-white outline-none"
        >
          <option value="">Välj program</option>
          <option value="natur">Naturvetenskapsprogrammet</option>
          <option value="teknik">Teknikprogrammet</option>
          <option value="ekonomi">Ekonomiprogrammet</option>
          <option value="samhalle">Samhällsvetenskapsprogrammet</option>
          <option value="estet">Estetiska programmet</option>
        </select>
      </div>
      <h1 class="text-4xl md:text-5xl font-extrabold mb-3 bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">
        Gymnasie Meritkalkylator
      </h1>
      <p class="text-slate-300 text-lg">
        Räkna ut ditt meritvärde snabbt och snyggt.
      </p>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left rounded-2xl overflow-hidden">
        <thead class="bg-white/10 text-slate-200">
          <tr>
            <th class="p-4">Kurs</th>
            <th class="p-4">Betyg</th>
            <th class="p-4">Poäng</th>
            <th class="p-4 text-right">Ta bort</th>
          </tr>
        </thead>

        <tbody id="courseTable" class="divide-y divide-white/10"></tbody>
      </table>
    </div>

    <div class="mt-6 flex flex-col md:flex-row gap-4">
      <button
        onclick="addCourse()"
        class="bg-cyan-500 hover:bg-cyan-400 transition px-6 py-3 rounded-2xl font-semibold shadow-lg"
      >
        + Lägg till kurs
      </button>

      <button
        onclick="calculateMerit()"
        class="bg-violet-500 hover:bg-violet-400 transition px-6 py-3 rounded-2xl font-semibold shadow-lg"
      >
        Räkna ut meritvärde
      </button>
    </div>

    <div class="grid md:grid-cols-4 gap-6 mt-10">

      <div class="glass rounded-2xl p-6 text-center">
        <p class="text-slate-300 mb-2">Jämförelsetal</p>
        <h2 id="average" class="text-3xl font-bold">0.00</h2>
      </div>

      <div class="glass rounded-2xl p-6 text-center">
        <p class="text-slate-300 mb-2">Totala Gymnasiepoäng</p>
        <h2 id="totalPointsDisplay" class="text-3xl font-bold">0 p</h2>
      </div>

      <div class="glass rounded-2xl p-6 text-center">
        <p class="text-slate-300 mb-2">Meritpoäng</p>
        <input
          id="extraPoints"
          type="number"
          min="0"
          max="2.5"
          step="0.1"
          value="0"
          class="bg-white/10 border border-white/10 rounded-xl p-3 w-full text-center text-2xl outline-none"
        />
      </div>

      <div class="bg-gradient-to-r from-cyan-500 to-violet-500 rounded-2xl p-6 text-center shadow-2xl">
        <p class="text-white/80 mb-2">Totalt Meritvärde</p>
        <h2 id="total" class="text-5xl font-extrabold">0.00</h2>
      </div>

    </div>

    <div class="mt-10 text-sm text-slate-400 text-center leading-relaxed">
      Betygsvärden: A = 20, B = 17.5, C = 15, D = 12.5, E = 10, F = 0
    </div>

  </div>

  <script>
    const table = document.getElementById('courseTable');

    const programs = {
      natur: [
        ['Svenska 1', 'C', 100],
        ['Svenska 2', 'C', 100],
        ['Svenska 3', 'C', 100],
        ['Engelska 5', 'C', 100],
        ['Engelska 6', 'C', 100],
        ['Matematik 1c', 'C', 100],
        ['Matematik 2c', 'C', 100],
        ['Matematik 3c', 'C', 100],
        ['Biologi 1', 'C', 100],
        ['Kemi 1', 'C', 100],
        ['Fysik 1', 'C', 150]
      ],

      teknik: [
        ['Svenska 1', 'C', 100],
        ['Svenska 2', 'C', 100],
        ['Svenska 3', 'C', 100],
        ['Engelska 5', 'C', 100],
        ['Engelska 6', 'C', 100],
        ['Matematik 1c', 'C', 100],
        ['Matematik 2c', 'C', 100],
        ['Matematik 3c', 'C', 100],
        ['Fysik 1', 'C', 150],
        ['Teknik 1', 'C', 150]
      ],

      ekonomi: [
        ['Svenska 1', 'C', 100],
        ['Svenska 2', 'C', 100],
        ['Svenska 3', 'C', 100],
        ['Engelska 5', 'C', 100],
        ['Engelska 6', 'C', 100],
        ['Matematik 1b', 'C', 100],
        ['Matematik 2b', 'C', 100],
        ['Företagsekonomi 1', 'C', 100],
        ['Privatjuridik', 'C', 100]
      ],

      samhalle: [
        ['Svenska 1', 'C', 100],
        ['Svenska 2', 'C', 100],
        ['Svenska 3', 'C', 100],
        ['Engelska 5', 'C', 100],
        ['Engelska 6', 'C', 100],
        ['Matematik 1b', 'C', 100],
        ['Samhällskunskap 1b', 'C', 100],
        ['Historia 1b', 'C', 100]
      ],

      estet: [
        ['Svenska 1', 'C', 100],
        ['Svenska 2', 'C', 100],
        ['Engelska 5', 'C', 100],
        ['Engelska 6', 'C', 100],
        ['Matematik 1b', 'C', 100],
        ['Estetisk kommunikation', 'C', 100]
      ]
    };

    const gradeValues = {
      A: 20,
      B: 17.5,
      C: 15,
      D: 12.5,
      E: 10,
      F: 0,
    };

    const availableCourses = [
      ['Psykologi 1', 50],
      ['Psykologi 2a', 50],
      ['Matematik 1a', 100],
      ['Matematik 1b', 100],
      ['Matematik 1c', 100],
      ['Matematik 2a', 100],
      ['Matematik 2b', 100],
      ['Matematik 2c', 100],
      ['Matematik 3b', 100],
      ['Matematik 3c', 100],
      ['Matematik 4', 100],
      ['Engelska 5', 100],
      ['Engelska 6', 100],
      ['Engelska 7', 100],
      ['Svenska 1', 100],
      ['Svenska 2', 100],
      ['Svenska 3', 100],
      ['Historia 1a1', 50],
      ['Historia 1b', 100],
      ['Samhällskunskap 1a1', 50],
      ['Samhällskunskap 1b', 100],
      ['Biologi 1', 100],
      ['Biologi 2', 100],
      ['Fysik 1', 150],
      ['Fysik 2', 100],
      ['Kemi 1', 100],
      ['Kemi 2', 100],
      ['Naturkunskap 1b', 100],
      ['Religionskunskap 1', 50],
      ['Privatjuridik', 100],
      ['Företagsekonomi 1', 100],
      ['Entreprenörskap', 100],
      ['Moderna språk 1', 100],
      ['Moderna språk 2', 100],
      ['Moderna språk 3', 100],
      ['Moderna språk 4', 100],
      ['Idrott och hälsa 1', 100],
      ['Programmering 1', 100],
      ['Webbutveckling 1', 100],
      ['Teknik 1', 150],
      ['Estetisk kommunikation', 100]
    ];

    function addCourse(course = '', grade = 'A', points = 100) {
      const row = document.createElement('tr');
      row.className = 'animate-fade';

      row.innerHTML = `
        <td class="p-4">
          <input
            type="text"
            list="courseOptions"
            placeholder="Ex. Matematik 2"
            value="${course}"
            onchange="updatePoints(this)"
            class="w-full bg-white/10 border border-white/10 rounded-xl p-3 outline-none"
          />

          <datalist id="courseOptions">
            ${availableCourses.map(c => `<option value="${c[0]}"></option>`).join('')}
          </datalist>
        </td>

        <td class="p-4">
          <select class="w-full bg-slate-800 text-white border border-white/10 rounded-xl p-3 outline-none">
            <option ${grade === 'A' ? 'selected' : ''}>A</option>
            <option ${grade === 'B' ? 'selected' : ''}>B</option>
            <option ${grade === 'C' ? 'selected' : ''}>C</option>
            <option ${grade === 'D' ? 'selected' : ''}>D</option>
            <option ${grade === 'E' ? 'selected' : ''}>E</option>
            <option ${grade === 'F' ? 'selected' : ''}>F</option>
          </select>
        </td>

        <td class="p-4">
          <input
            type="number"
            value="${points}"
            class="w-full bg-white/10 border border-white/10 rounded-xl p-3 outline-none"
          />
        </td>

        <td class="p-4 text-right">
          <button
            onclick="removeCourse(this)"
            class="bg-red-500 hover:bg-red-400 transition px-4 py-2 rounded-xl font-semibold"
          >
            Ta bort
          </button>
        </td>
      `;

      table.appendChild(row);

      calculateMerit();
    }

    function updatePoints(input) {
      const selectedCourse = input.value;
      const row = input.closest('tr');
      const pointsInput = row.querySelector('input[type="number"]');

      const found = availableCourses.find(c => c[0] === selectedCourse);

      if (found) {
        pointsInput.value = found[1];
      }
    }

    function loadProgram() {
      const selected = document.getElementById('programSelect').value;

      table.innerHTML = '';

      if (!selected || !programs[selected]) return;

      programs[selected].forEach(course => {
        addCourse(course[0], course[1], course[2]);
      });

      calculateMerit();
    }

    function removeCourse(button) {
      button.closest('tr').remove();
      calculateMerit();
    }

    function calculateMerit() {
      const rows = table.querySelectorAll('tr');

      let totalWeighted = 0;
      let totalPoints = 0;

      rows.forEach(row => {
        const grade = row.querySelector('select').value;
        const points = parseFloat(row.querySelector('input[type="number"]').value) || 0;

        totalWeighted += gradeValues[grade] * points;
        totalPoints += points;
      });

      let average = totalPoints > 0 ? totalWeighted / totalPoints : 0;

      const extra = parseFloat(document.getElementById('extraPoints').value) || 0;

      let total = average + extra;

      if (total > 22.5) total = 22.5;

      document.getElementById('average').innerText = average.toFixed(2);
      document.getElementById('totalPointsDisplay').innerText = totalPoints + ' p';
      document.getElementById('total').innerText = total.toFixed(2);
    }

    addCourse('Matematik 2', 'A', 100);
    addCourse('Svenska 3', 'B', 100);
    addCourse('Engelska 7', 'A', 100);

    calculateMerit();
  </script>

</body>
</html>
